name: BMW Initial Auth

on:
  workflow_dispatch:
    inputs:
      captcha_token:
        description: 'hCaptcha token from the Connect BMW page'
        required: true

permissions:
  contents: write

jobs:
  authenticate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install bimmer_connected httpx pynacl

      - name: Authenticate with BMW
        env:
          BMW_USERNAME: ${{ secrets.BMW_USERNAME }}
          BMW_PASSWORD: ${{ secrets.BMW_PASSWORD }}
          BMW_REGION: ${{ secrets.BMW_REGION }}
          BMW_VIN: ${{ secrets.BMW_VIN }}
          BMW_CAPTCHA_TOKEN: ${{ inputs.captcha_token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/bmw-auth-workflow.py

      - name: Fetch vehicle data
        env:
          BMW_USERNAME: ${{ secrets.BMW_USERNAME }}
          BMW_PASSWORD: ${{ secrets.BMW_PASSWORD }}
          BMW_REGION: ${{ secrets.BMW_REGION }}
          BMW_VIN: ${{ secrets.BMW_VIN }}
          BMW_OAUTH_STORE: ${{ secrets.BMW_OAUTH_STORE }}
        run: python scripts/sync-bmw.py

      - name: Commit changes
        run: |
          git config user.name "BMW Sync Bot"
          git config user.email "bot@noreply.github.com"
          git add static/data/vehicle.json
          git diff --cached --quiet || git commit -m "BMW: initial odometer sync $(date -I)"
          git push
