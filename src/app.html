<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a2e" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/icons/icon-192.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
